<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>ADE20K Texture Miner Review</title>
  <style>
    :root{--bg:#eef2f6;--panel:#fff;--ink:#152235;--line:#d6dee7;--muted:#5b6a7e}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(135deg,#e8eef4,#f6f9fc);font-family:"Avenir Next","Helvetica Neue",sans-serif;color:var(--ink)}
    .wrap{max-width:1450px;margin:0 auto;padding:16px}
    .head{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .help{margin:10px 0;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;color:var(--muted);font-size:13px;line-height:1.45}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;border:1px solid var(--line);background:#f8fbff;color:#405068;border-radius:999px;padding:4px 9px}
    .chip b{color:#10233a}
    .quick{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .qbtn{height:32px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 10px;cursor:pointer;color:#30445d}
    .qbtn.active{background:#0f3c7512;border-color:#0f3c7561;color:#0f3c75;font-weight:600}
    .toolbar{display:grid;grid-template-columns:repeat(8,minmax(120px,1fr));gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;position:sticky;top:8px;z-index:5}
    label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:4px}
    input,select{height:34px;border:1px solid var(--line);border-radius:8px;padding:4px 8px;background:#fff}
    .exportbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:10px 0;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}
    .exportbar .btn{height:32px}
    .meta{display:flex;justify-content:space-between;align-items:center;margin:10px 2px;color:var(--muted);gap:10px;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
    .card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer}
    .card.picked{outline:3px solid #0f3c75;outline-offset:1px}
    .imgwrap{position:relative}
    .card img{display:block;width:100%;height:158px;object-fit:cover;background:#eef2f6}
    .pickbox-wrap{position:absolute;top:8px;right:8px;background:#ffffffee;border:1px solid #cad5e3;border-radius:999px;padding:3px 8px;font-size:12px;color:#3e536b;display:flex;align-items:center;gap:6px}
    .pickbox-wrap input{height:auto;width:auto}
    .txt{padding:8px 10px}
    .t{font-weight:700;font-size:13px}
    .s{font-size:12px;color:var(--muted);margin-top:2px}
    .pill{display:inline-block;font-size:11px;border-radius:999px;border:1px solid;padding:2px 8px}
    .selected{color:#0b7b46;border-color:#0b7b4638;background:#0b7b4610}
    .borderline{color:#946100;border-color:#94610038;background:#94610010}
    .rejected{color:#9f1239;border-color:#9f123938;background:#9f123910}
    .detail{position:fixed;right:0;top:0;height:100vh;width:min(980px,100vw);background:#fff;border-left:1px solid var(--line);transform:translateX(100%);transition:.2s;overflow:auto;z-index:20}
    .detail.open{transform:translateX(0)}
    .inner{padding:14px}
    .hero{width:100%;max-height:240px;object-fit:contain;background:#f5f7fa;border:1px solid var(--line);border-radius:10px}
    .imgrow{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .kv{margin-top:8px;font-size:13px}
    .kv b{display:inline-block;width:230px;color:var(--muted)}
    .btn{height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:0 10px;cursor:pointer}
    a.btn{display:inline-flex;align-items:center;text-decoration:none;color:#30445d}
    .btn.primary{background:#0f3c75;color:#fff;border-color:#0f3c75}
    .empty{grid-column:1/-1;background:#fff;border:1px solid #d6dee7;border-radius:10px;padding:14px;color:#5b6a7e}
    pre{white-space:pre-wrap;word-break:break-word;background:#f7f9fb;border:1px solid var(--line);padding:10px;border-radius:8px}
    @media (max-width:900px){.toolbar{grid-template-columns:repeat(2,minmax(120px,1fr))}.imgrow{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
  <div class="head">
    <h2>ADE20K Texture Miner Review</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <a class="btn" href="../method/">Method &amp; Ranking Evidence</a>
      <a class="btn" href="../">Home</a>
      <button class="btn" id="reset">Reset Filters</button>
    </div>
  </div>

  <div class="help">
    <div><b>How to review:</b> filter/sort, then mark good images with the checkbox on each card. You can auto-select by score threshold and manually deselect mistakes, then export selected names.</div>
    <div class="chips" id="stats_chips"></div>
  </div>

  <div class="quick">
    <button class="qbtn" id="q_all">Show all</button>
    <button class="qbtn" id="q_sel">Selected only</button>
    <button class="qbtn" id="q_bor">Borderline only</button>
    <button class="qbtn" id="q_rej">Rejected only</button>
  </div>

  <div class="toolbar">
    <label>Dataset<select id="f_dataset"><option value="">All</option></select></label>
    <label>Status<select id="f_status"><option value="">All</option><option value="selected">selected</option><option value="borderline">borderline</option><option value="rejected">rejected</option></select></label>
    <label>Sort<select id="f_sort"><option value="final">final score</option><option value="geom">boundary score</option><option value="stageA">stageA score</option><option value="stageB">stageB score</option><option value="masks">#masks</option></select></label>
    <label>Score min<input type="number" id="f_min" min="0" max="100" value="0"/></label>
    <label>Score max<input type="number" id="f_max" min="0" max="100" value="100"/></label>
    <label>Min masks<input type="number" id="f_masks" min="0" value="0"/></label>
    <label>Object max<input type="number" id="f_obj" min="0" max="1" step="0.01" value="1"/></label>
    <label>ID contains<input type="text" id="f_id" placeholder="ADE_train_000123"/></label>
  </div>

  <div class="exportbar">
    <label style="min-width:130px">Auto-select >= score<input type="number" id="exp_thr" min="0" max="100" value="80"/></label>
    <button class="btn" id="exp_auto">Auto-select (filtered)</button>
    <button class="btn" id="exp_sel_visible">Select visible</button>
    <button class="btn" id="exp_clear_visible">Clear visible</button>
    <button class="btn" id="exp_clear_all">Clear all picks</button>
    <button class="btn primary" id="exp_download_txt">Export picked names (.txt)</button>
    <button class="btn" id="exp_download_csv">Export picked manifest (.csv)</button>
    <span class="chip" id="picked_chip">Picked <b>0</b></span>
  </div>

  <div class="meta"><div id="count"></div><div>Keyboard: ← prev, → next, Esc close</div></div>
  <div id="grid" class="grid"></div>
</div>
<aside id="detail" class="detail"><div class="inner"></div></aside>
<script src="data.js?v=1772179552"></script>
<script>
const BUILD_TAG = "ade20k_v1";
const STATUS_SET = new Set(["selected", "borderline", "rejected"]);
const PICK_KEY = `rwtd_manual_picks_${location.pathname}`;

function num(v, d=0){
  const n = Number(v);
  return Number.isFinite(n) ? n : d;
}

function normalizeDataset(v){
  const s = String(v || "").trim().toLowerCase();
  if (s === "rwtd_reference" || s === "rwtd") return "rwtd";
  return s;
}

function normalizeStatus(v, score, decision){
  const s = String(v || "").trim().toLowerCase();
  if (["selected","accepted","accept","match"].includes(s)) return "selected";
  if (["borderline","review"].includes(s)) return "borderline";
  if (["rejected","reject","not_match","not-match","fail","not match"].includes(s)) return "rejected";

  const d = String(decision || "").trim().toLowerCase();
  if (d === "match") return "selected";
  if (d === "borderline") return "borderline";
  if (d === "not_match" || d === "not match") return "rejected";

  const fs = num(score, 0);
  if (fs >= 80) return "selected";
  if (fs >= 70) return "borderline";
  return "rejected";
}

function bust(path){
  const p = String(path || "").trim();
  if (!p) return "";
  return p + (p.includes("?") ? "&" : "?") + "v=" + BUILD_TAG;
}

function escapeHtml(s){
  return String(s || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function rowKey(r){
  return `${String(r.dataset || "unknown")}::${String(r.image_id || "")}`;
}

function loadPicked(){
  try{
    const raw = localStorage.getItem(PICK_KEY);
    if (!raw) return new Set();
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return new Set();
    return new Set(arr.map((x) => String(x)));
  } catch (_) {
    return new Set();
  }
}

function savePicked(){
  try {
    localStorage.setItem(PICK_KEY, JSON.stringify([...state.picked]));
  } catch (_) {}
}

const rawRows = Array.isArray(window.REVIEW_DATA) ? window.REVIEW_DATA : [];
const rows = rawRows.map((r) => {
  const row = {...r};
  row._dataset = normalizeDataset(row.dataset);
  row._status = normalizeStatus(row.status, row.final_score, row.stageD_decision);
  row.dataset = row._dataset || row.dataset || "";
  row.status = row._status;
  if (!row.thumb) row.thumb = row.image_path || row.mask_rel || row.overlay_rel || "";
  if (!row.image_path) row.image_path = row.thumb;
  if (!row.mask_rel) row.mask_rel = row.thumb;
  if (!row.overlay_rel) row.overlay_rel = row.thumb;
  return row;
});

const state = {rows, filtered: [], idx: -1, picked: loadPicked()};
const el = {
  dataset: document.getElementById("f_dataset"),
  status: document.getElementById("f_status"),
  sort: document.getElementById("f_sort"),
  min: document.getElementById("f_min"),
  max: document.getElementById("f_max"),
  masks: document.getElementById("f_masks"),
  obj: document.getElementById("f_obj"),
  id: document.getElementById("f_id"),
  grid: document.getElementById("grid"),
  count: document.getElementById("count"),
  detail: document.getElementById("detail"),
  inner: document.querySelector("#detail .inner"),
  reset: document.getElementById("reset"),
  chips: document.getElementById("stats_chips"),
  pickedChip: document.getElementById("picked_chip"),
  q_all: document.getElementById("q_all"),
  q_sel: document.getElementById("q_sel"),
  q_bor: document.getElementById("q_bor"),
  q_rej: document.getElementById("q_rej"),
  expThr: document.getElementById("exp_thr"),
  expAuto: document.getElementById("exp_auto"),
  expSelVisible: document.getElementById("exp_sel_visible"),
  expClearVisible: document.getElementById("exp_clear_visible"),
  expClearAll: document.getElementById("exp_clear_all"),
  expDownloadTxt: document.getElementById("exp_download_txt"),
  expDownloadCsv: document.getElementById("exp_download_csv")
};

function initDatasets(){
  const set = new Set(state.rows.map((r) => String(r.dataset || "").trim()).filter(Boolean));
  const vals = [...set].sort();
  for (const d of vals){
    const o = document.createElement("option");
    o.value = d;
    o.textContent = d;
    el.dataset.appendChild(o);
  }
}

function renderStats(){
  const dsCount = {};
  const stCount = {selected: 0, borderline: 0, rejected: 0};
  const selectedScores = [];
  const nonSelectedScores = [];
  for (const r of state.rows){
    const ds = String(r.dataset || "unknown");
    dsCount[ds] = (dsCount[ds] || 0) + 1;
    const st = String(r.status || "rejected");
    if (STATUS_SET.has(st)) stCount[st] += 1;
    const sc = num(r.final_score, NaN);
    if (Number.isFinite(sc)){
      if (st === "selected") selectedScores.push(sc);
      else nonSelectedScores.push(sc);
    }
  }

  const minSelected = selectedScores.length ? Math.min(...selectedScores) : NaN;
  const maxNonSelected = nonSelectedScores.length ? Math.max(...nonSelectedScores) : NaN;
  let cutoff = 60.0;
  if (
    Number.isFinite(minSelected) &&
    Number.isFinite(maxNonSelected) &&
    !(cutoff > maxNonSelected && cutoff <= minSelected)
  ){
    cutoff = Math.round((minSelected + maxNonSelected) / 2.0);
  }
  const goodCount = state.rows.filter((r) => num(r.final_score, 0) >= cutoff).length;

  const chips = [];
  chips.push(`<span class=\"chip\">Total <b>${state.rows.length}</b></span>`);
  chips.push(`<span class=\"chip\">Selected <b>${stCount.selected}</b></span>`);
  chips.push(`<span class=\"chip\">Borderline <b>${stCount.borderline}</b></span>`);
  chips.push(`<span class=\"chip\">Rejected <b>${stCount.rejected}</b></span>`);
  chips.push(`<span class=\"chip\">Recommended cutoff <b>&ge; ${cutoff.toFixed(1)}</b> (good: <b>${goodCount}</b>)</span>`);
  for (const ds of Object.keys(dsCount).sort()) {
    chips.push(`<span class=\"chip\">${escapeHtml(ds)} <b>${dsCount[ds]}</b></span>`);
  }
  el.chips.innerHTML = chips.join("");
}

function updatePickedChip(){
  el.pickedChip.innerHTML = `Picked <b>${state.picked.size}</b>`;
}

function sortRows(rows){
  const s = el.sort.value;
  const a = [...rows];
  if (s === "final") a.sort((x,y) => num(y.final_score) - num(x.final_score));
  if (s === "geom") a.sort((x,y) => num(y.geom_texture_boundary_score) - num(x.geom_texture_boundary_score));
  if (s === "stageA") a.sort((x,y) => num(y.stageA_rwtd_score) - num(x.stageA_rwtd_score));
  if (s === "stageB") a.sort((x,y) => num(y.stageB_clip_score) - num(x.stageB_clip_score));
  if (s === "masks") a.sort((x,y) => num(y.stageA_n_masks) - num(x.stageA_n_masks));
  return a;
}

function activeQuickButton(){
  const qs = [el.q_all, el.q_sel, el.q_bor, el.q_rej];
  qs.forEach((b) => b.classList.remove("active"));
  if (!el.status.value) el.q_all.classList.add("active");
  if (el.status.value === "selected") el.q_sel.classList.add("active");
  if (el.status.value === "borderline") el.q_bor.classList.add("active");
  if (el.status.value === "rejected") el.q_rej.classList.add("active");
}

function filterRows(){
  const ds = el.dataset.value;
  const st = el.status.value;
  const smin = num(el.min.value, 0);
  const smax = num(el.max.value, 100);
  const mm = num(el.masks.value, 0);
  const om = num(el.obj.value, 1);
  const id = String(el.id.value || "").toLowerCase();

  const rows = state.rows.filter((r) => {
    if (ds && String(r.dataset) !== ds) return false;
    if (st && String(r.status) !== st) return false;
    const fs = num(r.final_score);
    if (fs < smin || fs > smax) return false;
    if (num(r.stageA_n_masks) < mm) return false;
    if (num(r.geom_object_fraction, 0) > om) return false;
    if (id && !String(r.image_id || "").toLowerCase().includes(id)) return false;
    return true;
  });

  state.filtered = sortRows(rows);
  activeQuickButton();
  render();
}

function pill(s){
  return `<span class="pill ${s}">${escapeHtml(s)}</span>`;
}

function card(r, i){
  const k = rowKey(r);
  const checked = state.picked.has(k) ? "checked" : "";
  const pickedClass = state.picked.has(k) ? " picked" : "";
  const ds = r.dataset ? `${escapeHtml(r.dataset)} / ` : "";
  const thumb = bust(r.thumb);
  const orig = bust(r.image_path);
  return `<article class="card${pickedClass}" data-i="${i}"><div class="imgwrap"><img src="${thumb}" loading="lazy" onerror="this.onerror=null;this.src='${orig}'"/><label class="pickbox-wrap"><input type="checkbox" class="pickbox" data-i="${i}" ${checked}/>pick</label></div><div class="txt"><div class="t">${ds}${escapeHtml(r.image_id)}</div><div class="s">final ${num(r.final_score).toFixed(1)} | boundary ${num(r.geom_texture_boundary_score).toFixed(1)} | obj ${num(r.geom_object_fraction).toFixed(3)}</div><div class="s">${pill(r.status)}</div></div></article>`;
}

function render(){
  el.count.textContent = `${state.filtered.length} samples`;
  if (!state.filtered.length){
    const active = [
      `dataset=${el.dataset.value || "all"}`,
      `status=${el.status.value || "all"}`,
      `score=${el.min.value}-${el.max.value}`,
      `min_masks=${el.masks.value}`,
      `obj_max=${el.obj.value}`
    ].join(" | ");
    el.grid.innerHTML = `<div class=\"empty\">No samples match current filters.<br/><br/><code>${escapeHtml(active)}</code><br/><br/>Tip: click <b>Reset Filters</b> or quick buttons above.</div>`;
    updatePickedChip();
    return;
  }
  el.grid.innerHTML = state.filtered.map((r, i) => card(r, i)).join("");
  el.grid.querySelectorAll(".card").forEach((c) => c.onclick = () => openDetail(Number(c.dataset.i)));
  el.grid.querySelectorAll(".pickbox").forEach((cb) => cb.addEventListener("click", (ev) => {
    ev.stopPropagation();
    const i = Number(cb.dataset.i);
    if (!Number.isFinite(i) || i < 0 || i >= state.filtered.length) return;
    const r = state.filtered[i];
    const k = rowKey(r);
    if (cb.checked) state.picked.add(k);
    else state.picked.delete(k);
    savePicked();
    render();
  }));
  updatePickedChip();
}

function kv(label, value){
  return `<div class=\"kv\"><b>${escapeHtml(label)}</b>${escapeHtml(value ?? "")}</div>`;
}

function openDetail(i){
  if (i < 0 || i >= state.filtered.length) return;
  state.idx = i;
  const r = state.filtered[i];
  const k = rowKey(r);
  const thumb = bust(r.thumb);
  const orig = bust(r.image_path);
  const mask = bust(r.mask_rel);
  const over = bust(r.overlay_rel);

  const breakdown = r.score_breakdown_json ? String(r.score_breakdown_json) : "";
  let breakdownPretty = breakdown;
  try {
    breakdownPretty = JSON.stringify(JSON.parse(breakdown), null, 2);
  } catch (_) {}

  const isPicked = state.picked.has(k);

  el.inner.innerHTML = `
    <div style="position:sticky;top:0;background:#fff;padding:6px 0 10px">
      <button class="btn" id="c">Close</button>
      <button class="btn" id="p">Prev</button>
      <button class="btn" id="n">Next</button>
      <button class="btn ${isPicked ? "primary" : ""}" id="pick_toggle">${isPicked ? "Unpick" : "Pick"}</button>
    </div>
    <h3>${escapeHtml(r.dataset ? `${r.dataset} / ${r.image_id}` : r.image_id)}</h3>
    <div class="imgrow">
      <figure><img class="hero" src="${orig}" onerror="this.onerror=null;this.src='${thumb}'"/><figcaption>Original</figcaption></figure>
      <figure><img class="hero" src="${mask}" onerror="this.onerror=null;this.src='${thumb}'"/><figcaption>Annotation mask visualization</figcaption></figure>
      <figure><img class="hero" src="${over}" onerror="this.onerror=null;this.src='${thumb}'"/><figcaption>Texture-boundary overlay</figcaption></figure>
    </div>

    ${kv("dataset", r.dataset || "")}
    ${kv("status", r.status || "")}
    ${kv("selection_reason", r.selection_reason || "")}
    ${kv("final_score", num(r.final_score).toFixed(2))}
    ${kv("stageA_rwtd_score", r.stageA_rwtd_score ?? "")}
    ${kv("geom_texture_boundary_score", r.geom_texture_boundary_score ?? "")}
    ${kv("geom_object_fraction", r.geom_object_fraction ?? "")}
    ${kv("geom_texture_fraction", r.geom_texture_fraction ?? "")}
    ${kv("geom_num_large_texture_regions", r.geom_num_large_texture_regions ?? "")}
    ${kv("geom_num_strong_boundaries", r.geom_num_strong_boundaries ?? "")}
    ${kv("geom_boundary_norm", r.geom_boundary_norm ?? "")}
    ${kv("stageB_clip_score", r.stageB_clip_score ?? "")}
    ${kv("stageD_score_0_100", r.stageD_score_0_100 ?? "")}
    ${kv("stageD_overlay_score_0_100", r.stageD_overlay_score_0_100 ?? "")}
    ${kv("stageD_overlay_pass", r.stageD_overlay_pass ?? "")}
    ${kv("stageD_overlay_reason", r.stageD_overlay_reason ?? "")}
    ${kv("stageA_n_masks", r.stageA_n_masks ?? "")}
    ${kv("stageA_largest_ratio", r.stageA_largest_ratio ?? "")}
    ${kv("stageA_small_frac", r.stageA_small_frac ?? "")}
    ${kv("stageA_pass", r.stageA_pass ?? "")}
    ${kv("stageB_pass", r.stageB_pass ?? "")}
    ${kv("stageD_decision", r.stageD_decision ?? "")}
    ${breakdownPretty ? `<div class=\"kv\"><b>score_breakdown_json</b></div><pre>${escapeHtml(breakdownPretty)}</pre>` : ""}
  `;

  el.detail.classList.add("open");
  document.getElementById("c").onclick = () => el.detail.classList.remove("open");
  document.getElementById("p").onclick = () => openDetail(Math.max(0, state.idx - 1));
  document.getElementById("n").onclick = () => openDetail(Math.min(state.filtered.length - 1, state.idx + 1));
  document.getElementById("pick_toggle").onclick = () => {
    if (state.picked.has(k)) state.picked.delete(k);
    else state.picked.add(k);
    savePicked();
    openDetail(state.idx);
    render();
  };
}

function pickRows(rows){
  for (const r of rows) state.picked.add(rowKey(r));
  savePicked();
  render();
}

function unpickRows(rows){
  for (const r of rows) state.picked.delete(rowKey(r));
  savePicked();
  render();
}

function downloadFile(filename, content, contentType){
  const blob = new Blob([content], {type: contentType || "text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function selectedRows(){
  return state.rows.filter((r) => state.picked.has(rowKey(r)));
}

function exportTxt(){
  const rows = selectedRows();
  const lines = rows.map((r) => `${r.dataset || ""}/${r.image_id || ""}`);
  downloadFile("picked_image_names.txt", lines.join("\n") + "\n", "text/plain;charset=utf-8");
}

function csvEscape(v){
  const s = String(v ?? "");
  if (s.includes(",") || s.includes("\n") || s.includes('"')) return '"' + s.replaceAll('"', '""') + '"';
  return s;
}

function exportCsv(){
  const rows = selectedRows();
  const header = ["dataset","image_id","image_path","final_score","status"];
  const out = [header.join(",")];
  for (const r of rows){
    out.push([
      csvEscape(r.dataset || ""),
      csvEscape(r.image_id || ""),
      csvEscape(r.image_path || ""),
      csvEscape(num(r.final_score, 0).toFixed(3)),
      csvEscape(r.status || "")
    ].join(","));
  }
  downloadFile("picked_manifest.csv", out.join("\n") + "\n", "text/csv;charset=utf-8");
}

[el.dataset, el.status, el.sort, el.min, el.max, el.masks, el.obj, el.id].forEach((x) => x.addEventListener("input", filterRows));

el.reset.onclick = () => {
  el.dataset.value = "";
  el.status.value = "";
  el.sort.value = "final";
  el.min.value = "0";
  el.max.value = "100";
  el.masks.value = "0";
  el.obj.value = "1";
  el.id.value = "";
  filterRows();
};

el.q_all.onclick = () => { el.status.value = ""; filterRows(); };
el.q_sel.onclick = () => { el.status.value = "selected"; filterRows(); };
el.q_bor.onclick = () => { el.status.value = "borderline"; filterRows(); };
el.q_rej.onclick = () => { el.status.value = "rejected"; filterRows(); };

el.expAuto.onclick = () => {
  const thr = num(el.expThr.value, 80);
  const rows = state.filtered.filter((r) => num(r.final_score, 0) >= thr);
  pickRows(rows);
};
el.expSelVisible.onclick = () => pickRows(state.filtered);
el.expClearVisible.onclick = () => unpickRows(state.filtered);
el.expClearAll.onclick = () => { state.picked.clear(); savePicked(); render(); };
el.expDownloadTxt.onclick = () => exportTxt();
el.expDownloadCsv.onclick = () => exportCsv();

document.addEventListener("keydown", (e) => {
  if (!el.detail.classList.contains("open")) return;
  if (e.key === "Escape") el.detail.classList.remove("open");
  if (e.key === "ArrowLeft") openDetail(Math.max(0, state.idx - 1));
  if (e.key === "ArrowRight") openDetail(Math.min(state.filtered.length - 1, state.idx + 1));
});

initDatasets();
renderStats();
filterRows();
updatePickedChip();
</script>
</body>
</html>
